name: CI

on:
  push:
     branches:
      - main
  pull_request:
     branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest

    env:
      MONGO_URI: ${{ secrets.MONGO_URI }}
      DB_NAME: ${{ secrets.DB_NAME }}
      MOCK_DB: ${{ secrets.MOCK_DB }}
      DEBUG: ${{ secrets.DEBUG }}
      JWT_SECRET_KEY: ${{ secrets.JWT_SECRET_KEY }}
      SES_SENDER_EMAIL: ${{ secrets.SES_SENDER_EMAIL }}
      AWS_SES_REGION: ${{ secrets.AWS_SES_REGION }}
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Run tests with coverage
        run: pytest -vv --cov=app --cov-report=term-missing tests/

  build:
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/fitness-api:latest
            ${{ secrets.DOCKER_USERNAME }}/fitness-api:${{ github.sha }}